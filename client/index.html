<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartHub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070014;
  --card:rgba(255,255,255,0.04);
  --accent:#7a5bff;
  --accent2:#00a6ff;
  --text:#eaf6ff;
}

body{
  margin:0;
  font-family:Orbitron;
  background:linear-gradient(135deg,#070014,#001233);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* APP */
.app{
  max-width:900px;
  margin:20px auto;
}

.panel{
  height:80vh;
  display:flex;
  flex-direction:column;
  background:var(--card);
  border-radius:16px;
  padding:15px;
  backdrop-filter: blur(10px);
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
  scroll-behavior:smooth;
}

.msg{
  margin:10px 0;
  display:flex;
}

.msg.user{justify-content:flex-end;}

.bubble{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  position:relative;
}

.user .bubble{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#001;
}

.ai .bubble{
  background:rgba(255,255,255,0.06);
}

/* COPY */
.copy{
  font-size:10px;
  opacity:0.6;
  cursor:pointer;
  margin-top:5px;
}

/* INPUT */
.input{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.05);
  color:white;
}

button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* TOP ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:12px;
  opacity:0.8;
}

/* typing */
.typing{
  display:flex;
  gap:5px;
  padding:10px;
}

.dot{
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
  0%,100%{transform:translateY(0);opacity:0.4}
  50%{transform:translateY(-5px);opacity:1}
}
</style>
</head>

<body>

<div class="header">
  <div>⚡ SmartHub AI</div>
  <div id="status">● online</div>
</div>

<div class="app">
  <div class="panel">

    <div class="actions">
      <span>💾 память: local</span>
      <span onclick="clearChat()" style="cursor:pointer;">🧹 очистить</span>
    </div>

    <div id="chat"></div>

    <div class="input">
      <input id="text" placeholder="Напиши сообщение..." />
      <button onclick="send()">Отправить</button>
    </div>

  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("text");
const status = document.getElementById("status");

const API_URL = "https://YOUR-RENDER.onrender.com/api/chat";

let memory = JSON.parse(localStorage.getItem("chat_memory") || "[]");

/* LOAD MEMORY */
window.onload = () => {
  memory.forEach(m => addMsg(m.text, m.role, false));
};

/* SAVE */
function save(){
  localStorage.setItem("chat_memory", JSON.stringify(memory));
}

/* MESSAGE */
function addMsg(text, role, save=true){
  const div = document.createElement("div");
  div.className = "msg " + role;

  div.innerHTML = `
    <div class="bubble">
      ${text}
      ${role==="ai" ? `<div class="copy" onclick="copy(this)">📋 копировать</div>` : ""}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(save){
    memory.push({text, role});
    save();
  }
}

/* COPY */
function copy(el){
  navigator.clipboard.writeText(el.parentElement.innerText);
}

/* TYPING */
function typing(){
  const t = document.createElement("div");
  t.className = "msg ai";
  t.id = "typing";

  t.innerHTML = `
    <div class="bubble">
      <div class="typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  `;

  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

/* SEND */
async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  status.textContent="● thinking...";
  typing();

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await res.json();

    removeTyping();
    addMsg(data.reply,"ai");

    status.textContent="● online";

  }catch(e){
    removeTyping();
    addMsg("Ошибка соединения","ai");
    status.textContent="● error";
  }
}

/* CLEAR */
function clearChat(){
  chat.innerHTML="";
  memory=[];
  save();
}
</script>

</body>
</html>
