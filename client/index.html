<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartHub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  background:linear-gradient(135deg,#070014,#001233);
  color:#eaf6ff;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.app{
  max-width:900px;
  margin:20px auto;
}

.panel{
  height:80vh;
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,0.03);
  border-radius:15px;
  padding:15px;
}

#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:10px 0;
  display:flex;
}

.msg.user{justify-content:flex-end;}

.bubble{
  max-width:70%;
  padding:10px;
  border-radius:10px;
}

.user .bubble{
  background:linear-gradient(135deg,#7a5bff,#00a6ff);
  color:black;
}

.ai .bubble{
  background:rgba(255,255,255,0.05);
}

.input{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  background:linear-gradient(135deg,#7a5bff,#00a6ff);
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.copy{
  font-size:10px;
  opacity:0.6;
  cursor:pointer;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>⚡ SmartHub AI</div>
  <div id="status">● online</div>
</div>

<div class="app">
  <div class="panel">
    <div id="chat"></div>

    <div class="input">
      <input id="text" placeholder="Напиши сообщение..." />
      <button onclick="send()">Отправить</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("text");
const status = document.getElementById("status");

// ⚠️ сюда вставишь свой Render URL
const API_URL = "https://YOUR-RENDER.onrender.com/api/chat";

function addMsg(text, role){
  const div = document.createElement("div");
  div.className = "msg " + role;

  div.innerHTML = `
    <div class="bubble">
      ${text}
      ${role === "ai" ? `<div class="copy" onclick="copyText(this)">📋 копировать</div>` : ""}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function copyText(el){
  const text = el.parentElement.innerText;
  navigator.clipboard.writeText(text);
}

async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  status.textContent = "● thinking...";

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await res.json();

    addMsg(data.reply, "ai");
    status.textContent = "● online";

  }catch(e){
    addMsg("Ошибка соединения", "ai");
    status.textContent = "● error";
  }
}

input.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
